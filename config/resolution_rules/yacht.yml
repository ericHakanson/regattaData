entity_type: yacht
source_system: "regattaman_csv_export|regattaman_public_scrape_csv|airtable_copy_csv|yacht_scoring_csv"
version: "v1.1.0"

# v1.1.0 changes (promotion-enable):
#   auto_promote lowered from 0.95 → 0.75.
#   review    lowered from 0.75 → 0.50.
#   hold      lowered from 0.50 → 0.25.
#
# Rationale: sail number is the strongest yacht identity anchor (weight 0.50);
# corroborated by normalized name (weight 0.30) it reaches a combined score of
# 0.80 with no penalties applied (sail present → no missing_sail_number penalty;
# name present → no missing_name penalty).  This score clearly clears the new
# auto_promote threshold of 0.75.
#
# Under v1.0.0 (auto_promote=0.95) these sail+name yachts were stranded in
# 'review' despite being unambiguously identified.
#
# Risk tradeoffs:
#   - Sail-only yachts: 0.50 - 0.20 (missing_name) = 0.30 → 'hold' under new rules.
#     They receive NBA to add a name before auto_promote is possible.
#   - Name-only yachts: 0.30 - 0.15 (missing_sail) = 0.15 → 'reject' under new rules.
#     Name alone is insufficient for confident deduplication across race sources.
#   - hard_block (conflicting_sail_number_same_name) unchanged; such yachts remain
#     at score=0/state=reject regardless of threshold.
#
# State-machine note: yachts currently in 'review' (sail+name score = 0.80)
# transition review → auto_promote, which is trigger-safe.
# The scoring engine's staged-transition path handles any yacht in 'reject' that
# newly scores ≥ 0.75 after enrichment, routing it reject → review → auto_promote.

thresholds:
  auto_promote: 0.75
  review: 0.50
  hold: 0.25

# Feature weights: sum to 1.0 for a fully-attributed yacht.
feature_weights:
  sail_number_exact: 0.50    # normalized sail number present
  name_normalized: 0.30      # normalized yacht name present
  yacht_type_present: 0.10   # yacht type (model/class) present
  length_feet_present: 0.10  # LOA in feet present

hard_blocks:
  - conflicting_sail_number_same_name   # same normalized name but different confirmed sail numbers across source rows

source_precedence:
  - regattaman_csv_export
  - airtable_copy_csv
  - regattaman_public_scrape_csv
  - yacht_scoring_csv

survivorship_rules:
  sail_number: highest_precedence_non_null
  name: highest_precedence_non_null
  yacht_type: highest_precedence_non_null
  length_feet: highest_precedence_non_null

missing_attribute_penalties:
  missing_sail_number: 0.15  # deduct if no sail number (harder to disambiguate)
  missing_name: 0.20         # deduct if yacht name is absent
